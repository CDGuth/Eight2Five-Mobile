# iOS builds, app store submissions, and Expo publishing steps are currently disabled but will be enabled in the future.

name: test+build+deploy

on:
  workflow_dispatch:
    inputs:
      target_app:
        type: choice
        description: "App to build"
        options:
          - mobile
          - testbed
        default: mobile
      build_android_dev:
        type: boolean
        description: "Build Android development APK"
        default: true
      build_android_prod_apk:
        type: boolean
        description: "Build Android production APK (.apk)"
        default: false
      build_android_prod_aab:
        type: boolean
        description: "Build Android production bundle (.aab)"
        default: false
      create_github_release:
        type: boolean
        description: "Create a GitHub release with build artifacts"
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run expo doctor (mobile)
        working-directory: apps/mobile
        run: npx expo-doctor

      - name: Run expo doctor (testbed)
        working-directory: apps/testbed
        run: npx expo-doctor

      - name: Run type checks (all workspaces)
        run: npm run type-check

      - name: Run lint (all workspaces)
        run: npm run lint

      - name: Run tests (all workspaces)
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      NODE_OPTIONS: --openssl-legacy-provider
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: Setup EAS build cache
        uses: actions/cache@v5
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: Verify EAS CLI installation
        run: eas --version

      - name: Build Development APK
        if: github.event.inputs.build_android_dev == 'true'
        working-directory: apps/${{ github.event.inputs.target_app }}
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile development --local --non-interactive --output=./app-dev.apk
        env:
          NODE_ENV: development

      - name: Build Production APK
        if: github.event.inputs.build_android_prod_apk == 'true'
        working-directory: apps/${{ github.event.inputs.target_app }}
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production-apk --local --non-interactive --output=./app-prod.apk
        env:
          NODE_ENV: production

      - name: Build Production AAB
        if: github.event.inputs.build_android_prod_aab == 'true'
        working-directory: apps/${{ github.event.inputs.target_app }}
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production --local --non-interactive --output=./app-prod.aab
        env:
          NODE_ENV: production

      - name: Generate build information
        id: build-info
        working-directory: apps/${{ github.event.inputs.target_app }}
        run: |
          VERSION=$(npx expo config --json | jq -r '.expo.version')
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          # Generate changelog from commit messages since last tag
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            git log $LAST_TAG..HEAD --pretty=format:"- %s" > changelog.md
          else
            git log --pretty=format:"- %s" -n 10 > changelog.md
          fi

      - name: Collect built artifacts for release
        id: collect-artifacts
        working-directory: apps/${{ github.event.inputs.target_app }}
        run: |
          FILES=""
          for f in ./app-dev.apk ./app-prod.apk ./app-prod.aab; do
            if [ -f "$f" ]; then
              if [ -z "$FILES" ]; then
                FILES="$f"
              else
                FILES="$FILES"$'\n'$"$f"
              fi
            fi
          done
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        if: ${{ steps.collect-artifacts.outputs.files != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}
          path: ${{ steps.collect-artifacts.outputs.files }}

      - name: Create GitHub Release
        if: ${{ steps.collect-artifacts.outputs.files != '' && github.event.inputs.create_github_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Release v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          tag_name: "v${{ steps.build-info.outputs.version }}-${{ steps.build-info.outputs.build_number }}"
          files: ${{ steps.collect-artifacts.outputs.files }}
          body_path: apps/${{ github.event.inputs.target_app }}/changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
