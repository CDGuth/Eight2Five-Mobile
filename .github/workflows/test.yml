name: test

on:
  push:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --openssl-legacy-provider
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run expo doctor (mobile)
        working-directory: apps/mobile
        run: npx expo-doctor

      - name: Run expo doctor (testbed)
        working-directory: apps/testbed
        run: npx expo-doctor

      - name: Run type checks (all workspaces)
        run: npm run type-check

      - name: Run lint (all workspaces)
        run: npm run lint

      - name: Run tests (all workspaces)
        run: npm run test
